# ==========================================================
# Personal Leak Detector — PRODUCTION compose
# Ishga tushirish:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Eslatma:
#  - postgres/redis TASHQARIGA OCHILMAGAN (faqat docker tarmog'i ichida) — xavfsiz.
#  - backend faqat 127.0.0.1:8000 ga bog'langan — unga faqat host nginx kiradi.
#  - frontend bu yerda YO'Q: u host nginx orqali static fayl sifatida beriladi.
# ==========================================================
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env.prod
    ports:
      - "127.0.0.1:8000:8000"   # faqat localhost — nginx proxy qiladi
    volumes:
      - uploads:/app/uploads
      - secure_files:/app/secure_files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env.prod
    command: celery -A app.celery_app worker --loglevel=info
    volumes:
      - uploads:/app/uploads
      - secure_files:/app/secure_files
    depends_on:
      - postgres
      - redis

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env.prod
    command: celery -A app.celery_app beat --loglevel=info
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
  uploads:
  secure_files:
