# ==========================================================
# Nginx — myleakdetector.org
# 1. Nusxa:   sudo cp deploy/nginx-myleakdetector.conf /etc/nginx/sites-available/myleakdetector
# 2. Yoqish:  sudo ln -s /etc/nginx/sites-available/myleakdetector /etc/nginx/sites-enabled/
# 3. SSL:     sudo certbot --nginx -d myleakdetector.org -d www.myleakdetector.org
# 4. Test:    sudo nginx -t && sudo systemctl reload nginx
#
# Frontend build joyi:  /var/www/myleakdetector/frontend/build
# Backend (docker):     127.0.0.1:8000
# ==========================================================

# HTTP -> HTTPS
server {
    listen 80;
    server_name myleakdetector.org www.myleakdetector.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name myleakdetector.org www.myleakdetector.org;

    # SSL — certbot avtomatik to'ldiradi
    ssl_certificate     /etc/letsencrypt/live/myleakdetector.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myleakdetector.org/privkey.pem;

    # Frontend static (React build)
    root  /var/www/myleakdetector/frontend/build;
    index index.html;

    client_max_body_size 12m;

    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # API va backend yo'llari -> FastAPI (docker)
    location ~ ^/(api|docs|redoc|openapi\.json|health) {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # React static fayllari — uzoq cache
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — barcha boshqa yo'llar index.html ga
    location / {
        try_files $uri /index.html;
    }
}
